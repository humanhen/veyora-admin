services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: veyora
      POSTGRES_USER: veyora
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veyora -d veyora"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: ./api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://veyora:${DB_PASSWORD}@db:5432/veyora
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      UPLOADS_DIR: /uploads
      IMPORT_DIR: /import
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Veyora <info@veyora.com>}
      PUBLIC_URL: ${PUBLIC_URL:-http://209.46.125.226}
      INGEST_KEY: ${INGEST_KEY:-}
      ZOHO_CLIENT_ID: ${ZOHO_CLIENT_ID:-}
      ZOHO_CLIENT_SECRET: ${ZOHO_CLIENT_SECRET:-}
      ZOHO_REFRESH_TOKEN: ${ZOHO_REFRESH_TOKEN:-}
      ZOHO_ORG_ID: ${ZOHO_ORG_ID:-875980504}
      ZOHO_DC: ${ZOHO_DC:-com}
      ZOHO_SYNC_MINUTES: ${ZOHO_SYNC_MINUTES:-30}
    volumes:
      - uploads:/uploads
      - ./data/import:/import
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./storefront:/srv/storefront:ro
      - ./admin:/srv/admin:ro
      - uploads:/srv/uploads:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
