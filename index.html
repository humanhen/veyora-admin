<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Veyora Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1815'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%23f5efe4' font-family='Georgia'>V</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Marcellus&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=6">
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="login-screen" class="login-screen hidden">
  <div class="login-photos">
    <div class="login-photo photo-a">
      <div class="photo-drape"></div>
      <div class="photo-figures">
        <svg viewBox="0 0 400 500" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
          <defs>
            <linearGradient id="lgA" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#b9a79a"/><stop offset="1" stop-color="#8a7466"/>
            </linearGradient>
          </defs>
          <ellipse cx="150" cy="180" rx="62" ry="70" fill="#2e2118"/>
          <path d="M150 130 q-70 -14 -78 60 q-6 66 30 96 q-40 -110 48 -156z" fill="#1d140d"/>
          <path d="M150 130 q70 -14 78 60 q6 66 -30 96 q40 -110 -48 -156z" fill="#1d140d"/>
          <ellipse cx="150" cy="196" rx="40" ry="46" fill="url(#lgA)"/>
          <g opacity="0.95">
            <rect x="112" y="182" width="34" height="24" rx="10" fill="#efe3da" stroke="#d6c2b4" stroke-width="2"/>
            <rect x="154" y="182" width="34" height="24" rx="10" fill="#efe3da" stroke="#d6c2b4" stroke-width="2"/>
            <path d="M146 192 h8" stroke="#d6c2b4" stroke-width="3"/>
          </g>
          <path d="M96 260 q54 40 108 0 l18 240 h-144z" fill="#e3c9c0"/>
          <ellipse cx="262" cy="250" rx="56" ry="62" fill="#3a2a1d"/>
          <path d="M262 200 q-64 -10 -66 62 q0 54 26 78 q-30 -104 40 -140z" fill="#241708"/>
          <ellipse cx="262" cy="262" rx="36" ry="42" fill="#c8ac97"/>
          <g opacity="0.95">
            <rect x="228" y="250" width="30" height="20" rx="4" fill="#3d3630"/>
            <rect x="266" y="250" width="30" height="20" rx="4" fill="#3d3630"/>
            <path d="M258 258 h8" stroke="#3d3630" stroke-width="3"/>
          </g>
          <path d="M212 318 q50 36 100 0 l22 182 h-142z" fill="#8b8f96"/>
        </svg>
      </div>
    </div>
    <div class="login-photo photo-b">
      <div class="photo-figures">
        <svg viewBox="0 0 400 500" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
          <defs>
            <radialGradient id="lgB" cx="0.5" cy="0.35" r="0.8">
              <stop offset="0" stop-color="#3d2f24"/><stop offset="1" stop-color="#150f0a"/>
            </radialGradient>
          </defs>
          <rect width="400" height="500" fill="url(#lgB)"/>
          <ellipse cx="205" cy="215" rx="86" ry="98" fill="#1c1108"/>
          <path d="M205 130 q-96 -10 -100 96 q-2 78 40 112 q-46 -150 60 -196z" fill="#0e0803"/>
          <path d="M205 130 q96 -10 100 96 q2 78 -40 112 q46 -150 -60 -196z" fill="#0e0803"/>
          <ellipse cx="205" cy="238" rx="52" ry="62" fill="#b98c68"/>
          <g>
            <path d="M154 221 q25 -11 48 1 l2 19 q-26 14 -46 -1z" fill="#241a10" stroke="#0d0905" stroke-width="3"/>
            <path d="M256 221 q-25 -11 -48 1 l-2 19 q26 14 46 -1z" fill="#241a10" stroke="#0d0905" stroke-width="3"/>
            <path d="M201 226 h8" stroke="#0d0905" stroke-width="4"/>
            <path d="M154 224 l-8 -3 M256 224 l8 -3" stroke="#0d0905" stroke-width="3"/>
          </g>
          <path d="M182 282 q22 10 44 0 l2 20 q-24 12 -48 0z" fill="#a2543f" opacity="0.85"/>
          <path d="M140 300 q66 44 132 0 l26 200 h-182z" fill="#131313"/>
          <path d="M60 340 q40 -18 76 6 l-10 154 h-96z" fill="#1b1b1d"/>
        </svg>
      </div>
      <div class="photo-light"></div>
    </div>
  </div>
  <div class="login-panel">
    <div class="login-panel-inner">
      <div class="brand-logo login-logo">VEYORA<span class="brand-reg">&reg;</span></div>
      <div class="login-welcome">WELCOME BACK</div>
      <h1 class="login-title">Sign in</h1>
      <p class="login-sub">Enter your admin credentials to continue.</p>
      <form id="login-form" autocomplete="off">
        <label class="login-label" for="login-email">EMAIL</label>
        <input id="login-email" class="login-input" type="email" placeholder="you@example.com" required>
        <div class="login-pass-row">
          <label class="login-label" for="login-password">PASSWORD</label>
          <a href="#" class="login-forgot" id="forgot-link">Forgot password?</a>
        </div>
        <div class="login-pass-wrap">
          <input id="login-password" class="login-input" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
          <button type="button" class="login-eye" id="login-eye" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <button type="submit" class="login-submit">SIGN IN</button>
      </form>
      <div class="login-footer">CHARLETT &middot; SAINT CLOUD &middot; HANDMADE ACETATE</div>
    </div>
  </div>
</div>

<!-- ============ FORGOT PASSWORD MODAL host, app shell ============ -->
<div id="app" class="app hidden">
  <aside class="sidebar" id="sidebar">
    <div class="brand-logo sidebar-logo">VEYORA<span class="brand-reg">&reg;</span></div>
    <nav class="side-nav" id="side-nav"></nav>
  </aside>
  <div class="main">
    <header class="topbar">
      <button class="menu-btn" id="menu-btn" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="brand-logo topbar-logo">VEYORA<span class="brand-reg">&reg;</span></div>
      <div class="topbar-spacer"></div>
      <button class="bell-btn" id="bell-btn" title="Tasks / notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="bell-badge hidden" id="bell-badge">0</span>
      </button>
      <div class="topbar-user">
        <div class="avatar" id="topbar-avatar">V</div>
        <div class="topbar-user-meta">
          <div class="topbar-user-name" id="topbar-username">Veyora admin</div>
          <div class="topbar-user-role" id="topbar-userrole">Admin</div>
        </div>
      </div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>

<div id="sidebar-overlay" class="sidebar-overlay hidden"></div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script src="js/util.js?v=6"></script>
<script src="js/data.js?v=6"></script>
<script src="js/app.js?v=6"></script>
<script src="js/pages_core.js?v=6"></script>
<script src="js/pages_sales.js?v=6"></script>
<script src="js/pages_customers.js?v=6"></script>
<script src="js/pages_catalog.js?v=6"></script>
<script src="js/pages_finance.js?v=6"></script>
<script src="js/pages_ops.js?v=6"></script>
<script>App.init();</script>
</body>
</html>
